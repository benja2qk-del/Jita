<pre id="log" style="font-family:monospace;white-space:pre-wrap;color:#eee;background:#111;padding:20px;"></pre>
<script>
const log = document.getElementById('log');
function logMsg(msg) { log.textContent += msg + '\n'; }
window.onerror = function(msg, src, line, col, err) {
    logMsg('ERROR: ' + msg);
    logMsg('  File: ' + src + ' Line: ' + line + ' Col: ' + col);
    if (err && err.stack) logMsg('  Stack: ' + err.stack);
    return false;
};
logMsg('Starting script load test...');
</script>
